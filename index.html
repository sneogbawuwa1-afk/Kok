function getKey(week, dayId, exIdx, field, setIdx = 0){ return (field === "weight" || field === "reps_done" || field === "rpe") ? `W${week}_${dayId}_${exIdx}_S${setIdx}_${field}` : `W${week}_${dayId}_${exIdx}_${field}`; }

  weight = parseFloat(weight); repsDone = parseInt(repsDone); rpe = parseFloat(rpe);
  if (!weight || isNaN(weight) || !repsDone || isNaN(repsDone)) return 0;
  if (!rpe || isNaN(rpe)) rpe = 10;
  let rir = 10 - rpe;
  let totalEffectiveReps = repsDone + rir;
  if (totalEffectiveReps <= 0) totalEffectiveReps = 1;
  return +(weight * (1 + (totalEffectiveReps / 30))).toFixed(1);
}

function getBestSetStats(week, dayId, exIdx, totalSets) {
  let max1RM = 0, maxWeight = 0;
  for(let s=0; s<totalSets; s++) {
    const w = parseFloat(getData(week, dayId, exIdx, "weight", 0, s)) || 0;
    const rpe = parseFloat(getData(week, dayId, exIdx, "rpe", 0, s)) || 0;
    const reps = parseInt(getData(week, dayId, exIdx, "reps_done", 0, s)) || 0;
    if(w > maxWeight) maxWeight = w;
    if(w && reps > 0) { const current1RM = calculateEstimated1RM(w, rpe, reps); if(current1RM > max1RM) max1RM = current1RM; }
  }
  return { max1RM, maxWeight };
}

function startRestTimer(){
  clearInterval(timerInterval);
  const banner = document.getElementById("timerBanner"), textVal = document.getElementById("timerCountdown"), barFill = document.getElementById("timerBarFill");
  if(!banner || !textVal || !barFill) return;
  let timeLeft = 90; banner.style.display = "block"; textVal.innerText = timeLeft; barFill.style.width = "100%";
  timerInterval = setInterval(() => {
    timeLeft--; textVal.innerText = timeLeft; barFill.style.width = (timeLeft / 90 * 100) + "%";
    if(timeLeft <= 0) { clearInterval(timerInterval); banner.style.display = "none"; if(navigator.vibrate) navigator.vibrate(200); }
  }, 1000);
}

document.getElementById("timerCloseBtn").onclick = function(){ clearInterval(timerInterval); document.getElementById("timerBanner").style.display = "none"; };

function getPastPerformance(dayId, exIdx, totalSets) {
  let perfList = [];
  for(let w = 0; w < 12; w++) {
    const stats = getBestSetStats(w, dayId, exIdx, totalSets);
    if(stats.maxWeight > 0) perfList.push({ week: w + 1, weight: stats.maxWeight, e1rm: stats.max1RM });
  }
  return perfList;
}

function renderWeekSelector(){
  const container = document.getElementById("weekNavTabs");
  if(!container) return;
  container.innerHTML = Array.from({length:12},(_,w)=>`<div class="week-nav-tab${currentTrackingWeek === w ? ' active' : ''}" data-widx="${w}">Hafta ${w+1}</div>`).join("");
  container.querySelectorAll(".week-nav-tab").forEach(tab => tab.onclick = function() { currentTrackingWeek = parseInt(this.dataset.widx); render(); });
}

function renderDayTabs(){
  const tabs = document.getElementById("dayTabs");
  if(!tabs) return;
  tabs.innerHTML = DAYS.map((d,i)=>`<button class="day-tab${activeDay===i?" active":""}" style="${activeDay===i?`border-bottom-color:${d.color}`:""}">${d.label}</button>`).join("");
  tabs.querySelectorAll(".day-tab").forEach((btn,i)=>btn.onclick=()=>{activeDay=i;expandedEx=null;activeSection="workout";render();});
}

function renderMain(){
  const day = DAYS[activeDay];
  const done = day.exercises.filter((_,i)=>getData(currentTrackingWeek, day.id,i,"done")==="1").length;
  const pct = Math.round(done/day.exercises.length*100);

  let html = `
  <div class="day-banner" style="background:${day.color}15;border-left-color:${day.color}">
    <div class="day-banner-text">
      <div class="day-focus" style="color:${day.color}">${day.full} (HAFTA ${currentTrackingWeek+1})</div>
      <div class="day-name">${day.focus}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="background:${day.color};width:${pct}%"></div></div>
        <div class="progress-label">${done}/${day.exercises.length} egzersiz</div>
      </div>
    </div>
  </div>
  <div class="tabs-secondary">
    <div class="tab-sec${activeSection==="workout"?" active":""}" style="${activeSection==="workout"?`color:${day.color};border-color:${day.color}40`:""}">Antrenman</div>
    <div class="tab-sec${activeSection==="progress"?" active":""}" style="${activeSection==="progress"?`color:${day.color};border-color:${day.color}40`:""}">İlerleme Grafiği</div>
    <div class="tab-sec${activeSection==="progression"?" active":""}" style="${activeSection==="progression"?`color:${day.color};border-color:${day.color}40`:""}">Ağırlık Artış Matrisi</div>
  </div>`;

  if(activeSection==="workout") html += renderWorkout(day);
  else if(activeSection==="progress") html += renderProgress(day);
  else html += renderProgression(day);

  html += renderWeeklyOverview();
  
  const mainEl = document.getElementById("main");
  if(mainEl) mainEl.innerHTML = html;

  document.querySelectorAll(".tab-sec").forEach((t,i)=>{
    const sections=["workout","progress","progression"];
    t.onclick=()=>{activeSection=sections[i];render();};
  });

  if(activeSection==="workout") bindWorkout(day);
  if(activeSection==="progress") bindProgress(day);
  if(activeSection==="progression") bindProgression(day);
  bindOverview();
}

function renderWorkout(day){
  return day.exercises.map((ex,i)=>{
    const isDone = getData(currentTrackingWeek, day.id,i,"done")==="1";
    const note = getData(currentTrackingWeek, day.id,i,"note","");
    const isOpen = expandedEx===i;
    const pastPerformance = getPastPerformance(day.id, i, ex.sets);
    const stats = getBestSetStats(currentTrackingWeek, day.id, i, ex.sets);

    let setRowsHtml = "";
    for(let s = 0; s < ex.sets; s++) {
      const w = getData(currentTrackingWeek, day.id, i, "weight", "", s);
      const repsDone = getData(currentTrackingWeek, day.id, i, "reps_done", "", s);
      const rpe = getData(currentTrackingWeek, day.id, i, "rpe", "", s);
      let prevDetails = "";
      if (currentTrackingWeek > 0) {
        const prevW = getData(currentTrackingWeek - 1, day.id, i, "weight", "", s);
        const prevReps = getData(currentTrackingWeek - 1, day.id, i, "reps_done", "", s);
        if (prevW) prevDetails = `${prevW}kg x ${prevReps || '?'}`;
      }
      setRowsHtml += `
      <div class="set-row">
        <div class="set-num">S${s+1}</div>
        <div class="set-inputs">
          ${prevDetails ? `<div style="font-size:8px;color:#555;margin-right:auto">Önceki: ${prevDetails}</div>` : ''}
          <div class="weight-box">
            <input class="weight-input" id="w_${i}_s${s}" type="number" placeholder="KG" value="${w}" min="0" step="0.5" style="border-color:${w?day.color+"60":"#2a2a3a"};color:${w?day.color:"#ccc"}">
          </div>
          <div class="weight-box">
            <input class="rep-input" id="rep_${i}_s${s}" type="number" placeholder="${ex.reps}" value="${repsDone}" min="0" style="border-color:${repsDone?day.color+"60":"#2a2a3a"};color:${repsDone?day.color:"#ccc"}">
          </div>
          <div class="rpe-box">
            <select class="rpe-select" id="rpe_${i}_s${s}" style="border-color:${rpe?day.color+"60":"#2a2a3a"};color:${rpe?day.color:"#ccc"}">
              <option value="">RPE</option>${[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<option${rpe==r?" selected":""}>${r}</option>`).join("")}
            </select>
          </div>
        </div>
      </div>`;
    }

    return `
    <div class="exercise-card${isDone?" done":""}" id="excard_${i}">
      <div class="ex-main">
        <div class="ex-check" id="chk_${i}" style="border-color:${isDone?day.color:"#2a2a3a"};background:${isDone?day.color:"transparent"}">
          ${isDone?"✓":""}
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="badges">
            <span class="badge" style="background:${day.color}20;color:${day.color}">${ex.sets} SET</span>
            <span class="badge" style="background:#1e1e2e;color:#aaa">Hedef: ${ex.reps} TK</span>
          </div>
        </div>
      </div>
      <div class="ex-footer" id="expand_${i}">
        <i class="ti ti-tool" style="color:#444;font-size:13px"></i>
        <span class="machine-label">${ex.machine}</span>
        <i class="ti ti-chevron-${isOpen?"up":"down"}" style="color:#333;font-size:12px"></i>
      </div>
      ${isOpen?`
      <div class="ex-expand">
        <div class="sets-container" style="padding:10px 14px; margin-top:0">
           ${setRowsHtml}
        </div>
        <div class="tip-box">
          <div class="tip-title"><i class="ti ti-bulb" style="font-size:12px"></i> Teknik ipucu</div>
          <div class="tip-text">${ex.tip}</div>
          <div style="margin-top:10px">
            <div class="tip-title"><i class="ti ti-pencil" style="font-size:12px"></i> Not</div>
            <textarea id="note_${i}" rows="2" style="width:100%;background:#16161f;border:1px solid #2a2a3a;border-radius:8px;color:#e2e2e8;font-size:12px;padding:8px;resize:none;outline:none;font-family:inherit" placeholder="Bugünkü his, öneri…">${note}</textarea>
          </div>
        </div>
        <div class="history-box">
          <div class="history-title"><i class="ti ti-history" style="font-size:12px"></i> 12 Haftalık Geçmiş</div>
          <div class="history-list">
             ${pastPerformance.length === 0 ? '<div style="font-size:11px;color:#444;text-align:center">Veri yok.</div>' : 
              pastPerformance.map(p => `
                <div class="history-row" style="${p.week === currentTrackingWeek + 1 ? 'color:#fff;' : ''}">
                  <span>Hafta ${p.week}</span><span>${p.weight} KG</span><span style="color:#60a5fa">~${p.e1rm} kg</span>
                </div>
              `).join('')}
          </div>
        </div>
        <a class="yt-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.yt)}" target="_blank">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect width="22" height="16" rx="3.5" fill="#FF0000"/><path d="M9 4.5L15 8L9 11.5V4.5Z" fill="white"/></svg>
          <div><div class="yt-title">Nasıl Yapılır?</div></div>
        </a>
      </div>`:""}
    </div>`;
  }).join("")+`<button class="save-btn" id="saveBtn" style="background:${day.color}">DEĞİŞİKLİKLERİ KAYDET</button>`;
}

function bindWorkout(day){
  day.exercises.forEach((ex,i)=>{
    const chkEl = document.getElementById(`chk_${i}`);
    if(chkEl) chkEl.onclick=()=>{
        setData(currentTrackingWeek, day.id,i,"done", getData(currentTrackingWeek, day.id,i,"done")==="1"?"0":"1");
        localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data));
        render(); 
    };

    for(let s = 0; s < ex.sets; s++) {
      const wInp = document.getElementById(`w_${i}_s${s}`);
      if(wInp) { wInp.oninput=function(){ setData(currentTrackingWeek, day.id, i, "weight", this.value, s); localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data)); }; }
      const rInp = document.getElementById(`rep_${i}_s${s}`);
      if(rInp) { rInp.oninput=function(){ setData(currentTrackingWeek, day.id, i, "reps_done", this.value, s); localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data)); }; }
      const rpeSel = document.getElementById(`rpe_${i}_s${s}`);
      if(rpeSel) { rpeSel.onchange=function(){ setData(currentTrackingWeek, day.id, i, "rpe", this.value, s); localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data)); render(); }; }
    }

    const expBtn = document.getElementById(`expand_${i}`);
    if(expBtn) expBtn.onclick=()=>{expandedEx = expandedEx===i?null:i; render();};
    
    if(expandedEx===i){
      const noteTxt = document.getElementById(`note_${i}`);
      if(noteTxt) noteTxt.oninput=function(){ setData(currentTrackingWeek, day.id,i,"note",this.value); localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data)); };
    }
  });

  const saveBtn = document.getElementById("saveBtn");
  if(saveBtn) saveBtn.onclick=()=>{
      localStorage.setItem("gym_tracker_data_v3", JSON.stringify(data));
      const toast=document.getElementById("toast");
      if(toast) { toast.style.background=day.color; toast.style.display="block"; setTimeout(()=>toast.style.display="none",2000); }
  };
}

function renderProgress(day){
  return `<div class="chart-wrap"><div class="chart-title">Tahmini 1RM Güç Eğrisi</div><select class="ex-select" id="exChartSelect">${day.exercises.map((ex,i)=>`<option value="${i}"${i===selectedExChart?" selected":""}>${ex.name}</option>`).join("")}</select><div style="position:relative;height:220px"><canvas id="progressChart"></canvas></div></div>`;
}

function bindProgress(day){
  const sel = document.getElementById("exChartSelect");
  if(sel) sel.onchange=function(){selectedExChart=parseInt(this.value);renderProgressCharts(day);};
  renderProgressCharts(day);
}

function renderProgressCharts(day){
  if(typeof Chart === 'undefined') return;
  const exIdx = selectedExChart; const targetEx = day.exercises[exIdx];
  const labels=[], vals=[];
  for(let w=0; w<12; w++){ labels.push(`H${w+1}`); const stats = getBestSetStats(w, day.id, exIdx, targetEx.sets); vals.push(stats.max1RM > 0 ? stats.max1RM : null); }
  const c1=document.getElementById("progressChart");
  if(c1){ if(c1._chart) c1._chart.destroy(); c1._chart=new Chart(c1,{type:"line",data:{labels,datasets:[{label:"e1RM",data:vals,borderColor:"#3b82f6",fill:true,backgroundColor:"rgba(59, 130, 246, 0.1)"}]},options:{responsive:true,maintainAspectRatio:false}}); }
}

function renderProgression(day){
  const tableRows = day.exercises.map((ex,i)=>{
    const cur = getBestSetStats(progressionWeek, day.id, i, ex.sets).maxWeight;
    return `<tr><td>${ex.name.slice(0,20)}</td><td style="color:${day.color}">${cur ? cur + 'kg' : '—'}</td></tr>`;
  }).join("");
  return `<div class="chart-wrap"><table class="progression-table"><thead><tr><th>Egzersiz</th><th>Bu Hafta</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
}

function bindProgression(day){}

function renderWeeklyOverview(){
  return `<div class="weekly-overview"><div class="overview-title">Haftalık Özet</div><div class="overview-grid" id="ovGrid">${DAYS.map((d,i)=>{ const done=d.exercises.filter((_,j)=>getData(currentTrackingWeek, d.id,j,"done")==="1").length; const pct=Math.round(done/d.exercises.length*100); return `<div class="ov-card" id="ov_${i}" style="${activeDay===i?`border-color:${d.color}60`:""}"><div class="ov-label" style="color:${activeDay===i?d.color:"#444"}">${d.label}</div><div class="ov-bar"><div style="height:100%;background:${d.color};width:${pct}%"></div></div></div>`; }).join("")}</div></div><button class="danger-btn" id="resetAllBtn">TÜM VERİLERİ SIFIRLA</button>`;
}

function bindOverview(){
  DAYS.forEach((_,i)=>{ const el=document.getElementById(`ov_${i}`); if(el) el.onclick=()=>{activeDay=i;expandedEx=null;activeSection="workout";render();}; });
  const resetBtn = document.getElementById("resetAllBtn");
  if(resetBtn) resetBtn.onclick = function(){ if(confirm("Tüm veriler silinecek?")){ localStorage.removeItem("gym_tracker_data_v3"); location.reload(); } };
}

const homeBtn = document.getElementById("homeBtn");
if(homeBtn) homeBtn.onclick = function() { currentTrackingWeek = 0; activeDay = 0; activeSection = "workout"; expandedEx = null; render(); };

function render(){ renderWeekSelector(); renderDayTabs(); renderMain(); }
render();
</script>
